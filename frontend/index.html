<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>Tokyo Train Ticker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/ticker.css">
</head>
<body>
  <div id="screen">

    <!-- ── Header ── -->
    <div id="header">
      <div id="header-left">
        <span id="station-ja" class="station-ja"></span>
        <span id="station-en" class="station-en">TOKYO TRAIN TICKER</span>
      </div>
      <div id="header-right">
        <span id="clock">00:00:00</span>
      </div>
    </div>

    <!-- ── Main content ── -->
    <div id="content">

      <!-- Station board -->
      <div id="station-board" class="mode-view active">

        <!-- Hero card: next train -->
        <div id="next-card">
          <div id="next-badge-wrap">
            <div id="next-badge"></div>
          </div>
          <div id="next-info">
            <div id="next-line-name"></div>
            <div id="next-dest"></div>
            <div id="next-eta-row">
              <span id="next-eta"></span>
              <span id="next-delay"></span>
            </div>
            <div id="next-platform"></div>
          </div>
        </div>

        <!-- Upcoming trains -->
        <div id="upcoming-header" class="upcoming-head">
          <span class="col-line">LINE</span>
          <span class="col-dest">NEXT TRAINS</span>
          <span class="col-plat" id="plt-trigger" onclick="app.togglePltPopup()">PLT</span>
          <span class="col-time">MIN</span>
        </div>
        <div id="plt-popup" class="hidden">
          <div id="platform-buttons"></div>
        </div>
        <div id="train-list"></div>
        <div id="no-trains" class="hidden">No service data</div>

      </div>

      <!-- Line tracker mode -->
      <div id="line-tracker" class="mode-view">
        <div id="tracker-line-name"></div>
        <div id="tracker-trains"></div>
      </div>

      <!-- Station picker overlay -->
      <div id="station-picker" class="overlay hidden">
        <div class="overlay-title">SELECT STATION</div>
        <input id="station-search" type="text" placeholder="Type station name..." autocomplete="off" spellcheck="false">
        <div id="station-results"></div>
      </div>

      <!-- Line picker overlay -->
      <div id="line-picker" class="overlay hidden">
        <div class="overlay-title">SELECT LINE</div>
        <div id="line-results"></div>
      </div>

    </div>

    <!-- ── Footer nav ── -->
    <div id="footer">
      <button class="nav-btn active" id="btn-station" onclick="app.setMode('station')">STN</button>
      <button class="nav-btn" id="btn-line" onclick="app.setMode('line')">LINE</button>
      <button class="nav-btn" id="btn-pick-station" onclick="app.openStationPicker()">PICK</button>
      <div id="demo-badge" class="demo-badge hidden">DEMO</div>
    </div>

  </div>

  <!-- Dev controls (outside 320×240) -->
  <div id="dev-controls" class="dev-only">
    <div class="dev-label">LOCAL SIMULATION · 320×240 PiTFT</div>
    <div class="dev-row">
      <span>Station:</span>
      <select id="dev-station-select" onchange="app.selectStation(this.value)"></select>
    </div>
    <div class="dev-row">
      <span>Mode:</span>
      <button onclick="app.setMode('station')">Station Board</button>
      <button onclick="app.setMode('line')">Line Tracker</button>
    </div>
    <div class="dev-row" id="dev-line-row" style="display:none">
      <span>Line:</span>
      <select id="dev-line-select" onchange="app.selectLine(this.value)"></select>
    </div>
    <div class="dev-row"><span>Status:</span><span id="dev-status">Connecting...</span></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
